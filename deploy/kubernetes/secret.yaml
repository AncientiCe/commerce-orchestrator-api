# Secret template for sensitive values. Create the secret with:
#   kubectl create secret generic orchestrator-api-secret \
#     --from-literal=AUTH_BEARER_TOKEN='your-token' \
#     --from-literal=AUTH_TENANT_ID='prod' \
#     --from-literal=AUTH_CALLER_ID='prod'
# Or apply after replacing the base64-encoded placeholders below (e.g. echo -n 'token' | base64).
apiVersion: v1
kind: Secret
metadata:
  name: orchestrator-api-secret
  labels:
    app: orchestrator-api
type: Opaque
stringData:
  # Required in production. Replace with your API auth token.
  AUTH_BEARER_TOKEN: "CHANGE-ME"
  AUTH_TENANT_ID: "prod"
  AUTH_CALLER_ID: "prod"
