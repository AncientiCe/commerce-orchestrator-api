name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Conformance (discovery, A2A, AP2)
        run: |
          cargo test -p orchestrator-http --test discovery_test
          cargo test -p orchestrator-api --test authz_and_adapters

  release-gate:
    name: Release gate (acceptance)
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Full test suite (security, reliability, compatibility)
        run: cargo test --workspace --no-fail-fast

      - name: Doc tests
        run: cargo test --workspace --doc

  docker:
    name: Docker build and smoke
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: orchestrator-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (run container, health check)
        run: |
          docker run -d --name orch -p 8080:8080 \
            -e ENV=development \
            -e PERSISTENCE_PATH=/tmp/data \
            orchestrator-api:ci
          sleep 3
          curl -sf http://localhost:8080/health/live
          curl -sf http://localhost:8080/health/ready
          docker stop orch
